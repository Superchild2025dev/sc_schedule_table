<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>가경 수영장 - 선생님 승인 페이지</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<script>
(function(){
  var v=Date.now().toString(36);
  window.SC_ASSET_VERSION=v;
  window.scAsset=function(path){return path+(path.indexOf('?')>=0?'&':'?')+'v='+v;};
  window.scCss=function(path){document.write('<link rel="stylesheet" href="'+window.scAsset(path)+'">');};
  window.scJs=function(path){document.write('<script src="'+window.scAsset(path)+'"><\/script>');};
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script>scJs('js/firebase-config.js')</script>
<script>scJs('js/firebase-store.js')</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>scCss('auth.css')</script>
<script>scCss('parent.css')</script>
<script>scCss('teacher.css')</script>
</head>
<body>

<!-- [v118] 지점 선택 모달 -->
<div id="branch-modal" class="branch-modal">
  <div class="branch-modal-box">
    <h2 class="branch-modal-title">🏊 지점을 선택하세요</h2>
    <div class="branch-modal-btns">
      <button class="branch-btn" onclick="selectBranch('gagyeong')">
        <span class="branch-emoji">🏢</span>
        <span class="branch-name">가경점</span>
      </button>
      <button class="branch-btn" onclick="selectBranch('yongam')">
        <span class="branch-emoji">🏬</span>
        <span class="branch-name">용암점</span>
      </button>
    </div>
  </div>
</div>

<!-- 선생님 선택 화면 -->
<div id="teacher-select-screen" class="screen">
  <div class="login-box">
    <div class="logo">🏫</div>
    <h1>가경 수영장</h1>
    <p class="subtitle">선생님 승인 페이지</p>
    <div class="teacher-auth-line">
      <span data-auth-role></span>
      <span data-auth-email></span>
      <button type="button" onclick="SCAuth.signOut()">계정 로그아웃</button>
    </div>
    <div style="text-align:center;margin-bottom:8px">
      <button onclick="openBranchModal()" style="background:transparent;border:1px dashed #9CA3AF;color:#6B7280;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">⇄ 지점 변경</button>
    </div>
    <div id="pending-teachers" class="pending-teachers"></div>
    <div class="form-group">
      <label>담당 선생님 선택</label>
      <select id="teacher-pick" class="bg-select">
        <option value="">선택하세요</option>
      </select>
    </div>
    <button id="teacher-enter" class="btn-primary">입장</button>
    <button id="teacher-all" class="btn-secondary" onclick="(function(){var b=new URLSearchParams(location.search).get('branch')||localStorage.getItem('selected_branch')||'';location.href='desk.html'+(b?'?branch='+b:'');})()">데스크 페이지</button>
  </div>
</div>

<!-- 대시보드 -->
<div id="teacher-dashboard" class="screen" style="display:none">
  <div class="dashboard-header">
    <div class="hdr-left">
      <div class="child-name" id="teacher-display"></div>
      <div class="child-info" id="teacher-stats"></div>
    </div>
    <button id="teacher-logout" class="btn-icon">🚪</button>
  </div>

  <div class="container">
    <div class="tab-row">
      <button class="tab-btn active" data-tab="bogang">보강 신청 <span id="cnt-bogang" class="cnt-badge">0</span></button>
      <button class="tab-btn" data-tab="cancel">보강 취소 <span id="cnt-cancel" class="cnt-badge">0</span></button>
    </div>

    <div id="bogang-list" class="req-list"></div>
    <div id="bogang-history" class="history-panel"></div>
    <div id="cancel-list" class="req-list" style="display:none"></div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast" class="toast"></div>

<script>scJs('js/schedule-time.js')</script>
<script>scJs('js/auth-guard.js')</script>
<script>scJs('js/teacher.js')</script>
</body>
</html>
